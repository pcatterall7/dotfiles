set -s escape-time 5

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf

# switch panes using Alt-arrow without prefix
setw -g mode-keys vi
bind h select-pane -L
bind l select-pane -R
bind k select-pane -U
bind j select-pane -D

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# Status bar - Tokyo Night theme
set -g status-style 'bg=#1a1b26 fg=#c0caf5'
set -g window-status-current-style 'bg=#3b4261 fg=#7aa2f7 bold'
set -g window-status-style 'bg=#1a1b26 fg=#565f89'
set -g pane-border-style 'fg=#3b4261'
set -g pane-active-border-style 'fg=#7aa2f7'
set -g message-style 'bg=#1a1b26 fg=#c0caf5'

# Make it easier to reload my tmux config
bind r source-file ~/.tmux.conf \; display "Reloaded"


# Pipe tmux buffer to system clipboard (supports only mac)
if-shell "uname | grep -q Darwin" \
    "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy' \\; display \"Copied\""

# Fix colors to support 
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Shift-enter passthrough for claude code
set -as terminal-features 'xterm*:extkeys'