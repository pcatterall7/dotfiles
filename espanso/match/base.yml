# Automatically generated by espanso migration tool
# Original file: default.yml

search_shortcut: off

global_vars:
  - name: clipboard
    type: clipboard
  - name: relative_date
    type: script
    params:
      args:
        - python3
        - "%CONFIG%/scripts/date_converter.py"
      debug: true
matches:

### DATES ###
  - trigger: dts
    replace: "{{short_date}}"
    force_clipboard: true
    vars:
      - name: short_date
        type: date
        params:
          format: "%b %-e %Y"
  - trigger: dtS
    replace: "{{euro_date}}"
    force_clipboard: true
    vars:
      - name: euro_date
        type: date
        params:
          format: "%e %b %Y"
  - trigger: dtl
    replace: "{{long_date}}"
    force_clipboard: false
    vars:
      - name: long_date
        type: date
        params:
          format: "%Y-%m-%d"
  - trigger: dt/
    replace: "{{slash_date}}"
    force_clipboard: true
    vars:
      - name: slash_date
        type: date
        params:
          format: "%m/%d/%y"
  - trigger: dtt
    replace: "{{datetime}}"
    force_clipboard: false
    vars:
      - name: datetime
        type: date
        params:
          format: "%Y-%m-%d %H:%M"
  - trigger: dtw
    replace: "{{datetime}}"
    force_clipboard: false
    vars:
      - name: datetime
        type: date
        params:
          format: "%Y-W%W"

#### RELATIVE DATES ####

  - regex: ";(?P<date>mon|tue|wed|thu|fri|sat|sun|lmon|ltue|lwed|lthu|lfri|lsat|lsun|yest|tom)"
    replace: "{{relative_date}}"
    vars:
      - name: relative_date
        type: script
        params:
          args: 
            - /opt/homebrew/bin/lua
            - "%CONFIG%/scripts/relative_date.lua"
            - "{{date}}"

#### JIRA TEMPLATES ####

  - trigger: ;jbug"%Y
    replace: |-
      ### Summary
      
      ### Steps to reproduce
      
      ### Expected result
      
      ### Actual result
      
  - trigger: ;jt1
    replace: |-
      ### Problem
      
      ### Proposal
      
      ### Considerations
      
  - trigger: ;jt2
    replace: |-
      ### Summary
      
      ### Acceptance Criteria
      
      ### Links and references
  

#### CONTACT INFO ####

  - trigger: "@@"
    replace: philipcatterall@gmail.com

  - trigger: ;sa
    replace: phil.catterall@snowplowanalytics.com

  - trigger: ;si
    replace: phil.catterall@snowplow.io

  - trigger: ;c
    replace: 301-367-7195

#### MISC ####

  - trigger: ;gc
    replace: 'git commit -m "{{iso8601}} from my mac"'
    vars:
      - name: iso8601
        type: date
        params:
          format: "%Y-%m-%d %H:%M"

  - trigger: ;up
    replace: ☝️

  - trigger: ;shrug
    replace: ¯\_(ツ)_/¯
