# Automatically generated by espanso migration tool
# Original file: default.yml

global_vars:
  - name: clipboard
    type: clipboard
  - name: relative_date
    type: script
    params:
      args:
        - python
        - "%CONFIG%/scripts/date_converter.py"
      debug: true
matches:
### DATES ###
  - trigger: dts
    replace: "{{short_date}}"
    vars:
      - name: short_date
        type: date
        params:
          format: "%b %-e, %Y"
  - trigger: dtS
    replace: "{{euro_date}}"
    vars:
      - name: euro_date
        type: date
        params:
          format: "%e %b %Y"
  - trigger: dtl
    replace: "{{long_date}}"
    vars:
      - name: long_date
        type: date
        params:
          format: "%Y-%m-%d"
  - trigger: dt/
    replace: "{{slash_date}}"
    vars:
      - name: slash_date
        type: date
        params:
          format: "%m/%d/%y"

#### RELATIVE DATES ####

  - trigger: ;sun
    replace: "{{relative_date}}"
    vars:
      - name: day
        type: echo
        params:
          echo: sun
      - name: relative_date
        type: global
  - trigger: ;mon
    replace: "{{relative_date}}"
    vars:
      - name: day
        type: echo
        params:
          echo: mon
      - name: relative_date
        type: global
  - trigger: ;tue
    replace: "{{relative_date}}"
    vars:
      - name: day
        type: echo
        params:
          echo: tue
      - name: relative_date
        type: global
  - trigger: ;wed
    replace: "{{relative_date}}"
    vars:
      - name: day
        type: echo
        params:
          echo: wed
      - name: relative_date
        type: global
  - trigger: ;thu
    replace: "{{relative_date}}"
    vars:
      - name: day
        type: echo
        params:
          echo: thu
      - name: relative_date
        type: global
  - trigger: ;fri
    replace: "{{relative_date}}"
    vars:
      - name: day
        type: echo
        params:
          echo: fri
      - name: relative_date
        type: global
  - trigger: ;sat
    replace: "{{relative_date}}"
    vars:
      - name: day
        type: echo
        params:
          echo: sat
      - name: relative_date
        type: global

#### CHECKBOXES ####

  - trigger: ;bc
    replace: ✅ 

  - trigger: ;bb
    replace: ⬜️ 

#### JIRA TEMPLATES ####

  - trigger: ;jbug
    replace: |-
      ### Summary
      
      ### Steps to reproduce
      
      ### Expected result
      
      ### Actual result
      
  - trigger: ;jt1
    replace: |-
      ### Problem
      
      ### Proposal
      
      ### Considerations
      
  - trigger: ;jt2
    replace: |-
      ### Summary
      
      ### Acceptance Criteria
      
      ### Links and references
      
  - trigger: ;jc
    replace: C360-

#### CONTACT INFO ####

  - trigger: "@@"
    replace: philipcatterall@gmail.com

  - trigger: ;aiq
    replace: philip@actioniq.com

  - trigger: ;c
    replace: 301-367-7195

#### MISC ####

  - trigger: ;gc
    replace: 'git commit -m "{{iso8601}} from my mac"'
    vars:
      - name: iso8601
        type: date
        params:
          format: "%Y-%m-%d %H:%M"

  - trigger: ;up
