- defaults:
    link:
      relink: true
      create: true

- clean: ["~"]

- link:
    ~/.zshrc:
      path: zsh/zshrc
      force: true
    ~/.zprofile:
      path: zsh/zprofile
    ~/bin:
      path: bin
      force: true
    ~/Library/Preferences/espanso:
      if: '[ `uname` = Darwin ]'
      path: espanso/
      force: true
    ## NOT CURRENTLY USED
    # ~/.config/nvim:
    #   if: '[ `uname` = Darwin ]'
    #   path: nvim
    #   force: true
    ~/.tmux.conf:
      path: tmux/tmux.conf
      force: true
    ~/.oh-my-zsh/custom/themes/clean-custom.zsh-theme:
      path: zsh/clean-custom.zsh-theme
      force: true
    ## NOT CURRENTLY USED
    # ~/.config/aerospace:
    #   if: '[ `uname` = Darwin ]'
    #   path: aerospace
    #   force: true
    ~/.emacs.d:
      path: emacs
      force: true
    ~/.hammerspoon:
      if: '[ `uname` = Darwin ]'
      path: hammerspoon
      force: true
    ~/.config/zed:
      if: '[ `uname` = Darwin ]'
      path: zed
      force: true
    ~/Library/Application Support/Sublime Text/Packages/User/:
      if: '[ `uname` = Darwin ]'
      glob: true
      path: sublime-text/*
      force: true
    ~/.config/claude/skills/:
      glob: true
      path: skills/*
      create: true