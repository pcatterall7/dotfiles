- defaults:
    link:
        relink: true
        create: true

- clean: ['~']

- link:
    ~/.vimrc:
    ~/.vim: vim
    ~/.zshrc:
        force: true
    ~/.zprofile:
    ~/Library/Preferences/espanso/match/base.yml:
        path: espanso_base.yml
        force: true
    ~/.config/nvim: 
        path: nvim
        force: true
    ~/notes/personal/.obsidian.vimrc:
        path: obsidian.vimrc
        force: true
    ~/notes/aiq/.obsidian.vimrc:
        path: obsidian.vimrc
        force: true
    ~/notes/journal/.obsidian.vimrc:
        path: obsidian.vimrc
        force: true

