- defaults:
    link:
        relink: true
        create: true

- clean: ['~']

- link:
    ~/.zshrc:
        force: true
    ~/.zprofile:
    ~/Library/Preferences/espanso:
        path: espanso/
        force: true
    # ~/Library/Preferences/espanso/scripts:
    #     path: espanso/scripts
    #     force: true
    ~/.config/nvim:
        path: nvim
        force: true
    ~/.tmux.conf:
        path: tmux.conf
        force: true
    ~/.oh-my-zsh/custom/themes/clean-custom.zsh-theme:
        path: zsh/clean-custom.zsh-theme
        force: true
