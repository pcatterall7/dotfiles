- defaults:
    link:
        relink: true
        create: true

- clean: ['~']

- link:
    ~/.vimrc:
    ~/.vim: vim
    ~/.zshrc:
    ~/.zprofile:
    ~/Library/Preferences/espanso/match/base.yml:
        path: espanso_base.yml
        force: true
    ~/.config/nvim: 
        path: nvim
        force: true

