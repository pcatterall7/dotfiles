- defaults:
    link:
        relink: true
        create: true

- clean: ['~']

- link:
    ~/.vimrc:
    ~/.vim: vim
    ~/.zshrc:
        force: true
    ~/.zprofile:
    ~/Library/Preferences/espanso/match/base.yml:
        path: espanso/espanso_base.yml
        force: true
    ~/Library/Preferences/espanso/scripts:
        path: espanso/scripts
        force: true
    ~/.config/nvim: 
        path: nvim
        force: true
    ~/.tmux.conf:
        path: tmux.conf
        force: true
    ~/.config/zed:
        path: zed
        force: true
    ~/.hammerspoon:
        path: hammerspoon
